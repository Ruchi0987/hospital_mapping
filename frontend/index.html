<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital Mapping AI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Hospital Mapping AI</h1>
      <p>Enter a disease name and get recommended hospitals + specialized departments.</p>

      <form id="searchForm">
        <input
          id="diseaseInput"
          type="text"
          placeholder="Try: heart problem, cancer, diabetes"
          required
        />
        <button type="submit">Find Hospitals</button>
      </form>

      <p id="modelInfo" class="muted"></p>
      <section id="results" class="results"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
